<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网易云音乐下载</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      min-height: 150px;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: linear-gradient(to top, #e6e9f0 0%, #eef1f5 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      padding: 20px;
    }

    .container {
      text-align: center;
      width: 100%;
    }

    /* 按钮样式 */
    .button {
      display: inline-block;
      position: relative;
      z-index: 1;
      overflow: hidden;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      padding: 12px 24px;
      color: #c62f2f;
      border: 0.15em solid #c62f2f;
      border-radius: 2em;
      transition: 4s;
      cursor: pointer;
      background: transparent;
      outline: none;
      width: 100%;
    }

    .button:before,
    .button:after {
      content: "";
      position: absolute;
      top: -1.5em;
      z-index: -1;
      width: 200%;
      aspect-ratio: 1;
      border: none;
      border-radius: 40%;
      background-color: rgba(198, 47, 47, 0.25);
      transition: 4s;
    }

    .button:before {
      left: -80%;
      transform: translate3d(0, 5em, 0) rotate(-340deg);
    }

    .button:after {
      right: -80%;
      transform: translate3d(0, 5em, 0) rotate(390deg);
    }

    .button:hover,
    .button:focus {
      color: white;
    }

    .button:hover:before,
    .button:hover:after,
    .button:focus:before,
    .button:focus:after {
      transform: none;
      background-color: rgba(198, 47, 47, 0.9);
    }

    .button:disabled {
      color: #999;
      border-color: #999;
      cursor: not-allowed;
    }

    .button:disabled:before,
    .button:disabled:after {
      display: none;
    }

    #tip {
      margin-top: 15px;
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    .error {
      color: #c62f2f;
    }
  </style>
</head>
<body>
  <div class="container">
    <button id="downloadBtn" class="button">一键下载</button>
    <div id="tip">请确保在网易云音乐歌曲页面使用</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
